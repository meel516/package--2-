name: CI/CD EC2

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: groq-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: groq-agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Prepare runtime env file
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          set -euo pipefail
          printf "%s" "${APP_ENV_FILE}" > groq-agent/.env

      - name: Sync repository to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          set -euo pipefail
          SSH_OPTS="-p ${EC2_PORT:-22} -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o ConnectTimeout=20"

          for i in 1 2 3 4 5; do
            if ssh ${SSH_OPTS} "${EC2_USER}@${EC2_HOST}" "echo ok" >/dev/null 2>&1; then
              break
            fi
            echo "SSH preflight failed (attempt ${i}/5). Retrying..."
            sleep 10
            if [ "$i" -eq 5 ]; then
              echo "SSH preflight failed after 5 attempts."
              exit 1
            fi
          done

          for i in 1 2 3 4 5; do
            if rsync -az --delete \
              --exclude ".git" \
              --exclude "node_modules" \
              -e "ssh ${SSH_OPTS}" \
              ./ "${EC2_USER}@${EC2_HOST}:${EC2_APP_DIR}/"; then
              break
            fi
            echo "rsync failed (attempt ${i}/5). Retrying..."
            sleep 15
            if [ "$i" -eq 5 ]; then
              echo "rsync failed after 5 attempts."
              exit 1
            fi
          done

      - name: Build and restart container on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          set -euo pipefail
          SSH_OPTS="-p ${EC2_PORT:-22} -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o ConnectTimeout=20"

          for i in 1 2 3; do
            if ssh ${SSH_OPTS} "${EC2_USER}@${EC2_HOST}" "EC2_APP_DIR='${EC2_APP_DIR}' bash -s" << 'EOF'
            set -euo pipefail

            APP_DIR="${EC2_APP_DIR}/groq-agent"
            CONTAINER_NAME="groq-agent"
            IMAGE_NAME="groq-agent:latest"

            cd "${APP_DIR}"

            docker build -f Dockerfile.ec2 -t "${IMAGE_NAME}" .
            docker rm -f "${CONTAINER_NAME}" || true
            docker run -d \
             --name "${CONTAINER_NAME}" \
             --restart unless-stopped \
             -p 80:3003 \
             --env-file .env \
             "${IMAGE_NAME}"

            docker image prune -f
          EOF
              then
                break
              fi
              echo "Remote deploy command failed (attempt ${i}/3). Retrying..."
              sleep 15
              if [ "$i" -eq 3 ]; then
                echo "Remote deploy command failed after 3 attempts."
                exit 1
              fi
          done
